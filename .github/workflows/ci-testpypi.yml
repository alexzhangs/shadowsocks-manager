name: ci-testpypi

# This workflow bumps the version of the package (without commit and tag),
# builds and uploads the package to TestPyPI,
# and tests the installation under py3 from TestPyPI.
#
# This workflow is triggered by:
#   - a manual trigger
#   - a push to the master branch with changes in the certain paths
#   - a pull request to the master branch
#   - a monthly schedule

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/ci-testpypi.yml'
      - 'pyproject.toml'
  pull_request:
    branches:
      - master
  schedule:
    - cron: '23 11 1 * *'

env:
  PROJECT_NAME_FOR_TESTPYPI: shadowsocks-manager-alexzhangs

jobs:
  check-run-history:
    runs-on: ubuntu-latest
    outputs:
      RUN_HISTORY: ${{ steps.check-run.outputs.RUN_HISTORY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Check run history
        id: check-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_history=$(gh api repos/:owner/:repo/actions/workflows/ci-testpypi.yml/runs --jq '.workflow_runs | map(select(.head_sha == "${{ github.sha }}" and .id != '${{ github.run_id }}')) | length')
          echo "$run_history run(s) found."
          echo "RUN_HISTORY=$run_history" >> $GITHUB_OUTPUT

  testpypi-py3-build-and-upload:
    runs-on: ubuntu-latest
    needs: check-run-history
    if: ${{ github.actor != 'dependabot[bot]' && (github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || github.event_name == 'schedule' || (github.event_name == 'push' && needs.check-run-history.outputs.RUN_HISTORY == '0')) }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.14.5']
    outputs:
      NEW_VERSION: ${{ steps.bump-version.outputs.NEW_VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install build twine bump-my-version
      - name: Update project name to avoid naming conflict in TestPyPI
        run: |
          sed -i 's/^name = .*/name = "${{ env.PROJECT_NAME_FOR_TESTPYPI }}"/' pyproject.toml
      - name: Bump to a unique PEP 440 dev version without commit and tag
        id: bump-version
        run: |
          # bump-my-version's parse regex only models stable + post-releases,
          # so it silently no-ops on a PEP 440 .devN new-version. Use sed
          # directly for this disposable per-run snapshot version.
          current_version=$(bump-my-version show current_version)
          new_version="${current_version}.dev$(date +%Y%m%d%H%M%S)"
          sed -i -E "s/^version = \"${current_version}\"$/version = \"${new_version}\"/" pyproject.toml
          sed -i -E "s/^__version__ = \"${current_version}\"$/__version__ = \"${new_version}\"/" shadowsocks_manager/shadowsocks_manager/__init__.py
          echo "NEW_VERSION=${new_version}" >> $GITHUB_OUTPUT
      - name: Build source and binary distributions
        run: python -m build
      - name: Upload to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_TOKEN }}
        run: twine upload --repository testpypi dist/*

  testpypi-py3-install:
    runs-on: ubuntu-latest
    needs: testpypi-py3-build-and-upload
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.14.5']
    env:
      NEW_VERSION: ${{ needs.testpypi-py3-build-and-upload.outputs.NEW_VERSION }}
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install setuptools wheel
      - name: Install from binary distribution
        env:
          PIP_INDEX_URL: https://test.pypi.org/simple/
        run: |
          for attempt in 1 2 3; do
            timeout 360 pip install --no-deps --only-binary ${{ env.PROJECT_NAME_FOR_TESTPYPI }} ${{ env.PROJECT_NAME_FOR_TESTPYPI }}==${{ env.NEW_VERSION }} && break
            echo "Attempt $attempt failed"
            [ $attempt -lt 3 ] && sleep 5 || exit 1
          done
      - name: Clean up for installing source distribution
        run: |
          pip uninstall -y ${{ env.PROJECT_NAME_FOR_TESTPYPI }}
      - name: Install from source distribution with setuptools and wheel required
        env:
          PIP_INDEX_URL: https://test.pypi.org/simple/
        run: |
          for attempt in 1 2 3; do
            timeout 180 pip install --no-build-isolation --no-deps --no-binary ${{ env.PROJECT_NAME_FOR_TESTPYPI }} ${{ env.PROJECT_NAME_FOR_TESTPYPI }}==${{ env.NEW_VERSION }} && break
            echo "Attempt $attempt failed"
            [ $attempt -lt 3 ] && sleep 5 || exit 1
          done
