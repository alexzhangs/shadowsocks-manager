[program:ssm-celery-worker]
environment=%(ENV_SSM_ENV)s
; --pool=solo runs tasks in the worker process itself instead of forking a
; prefork pool child, saving ~100 MB RSS (each child loads the full Django app).
; Concurrency is effectively 1 either way for this single-node manager, so this
; is a pure memory win with no change in task-execution behaviour.
command=ssm-celery worker --pool=solo -l info
umask=022
user=%(ENV_SSM_USER)s
redirect_stderr=true
; Send logs to container stdout (fd 1) so the docker host log driver applies its
; rotation policy. Writing to a file inside the container makes rotated files
; accumulate in the overlay2 writable layer, which is NOT reclaimed when the
; in-container logrotate unlinks them — disk grows unboundedly.
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
killasgroup=true

[program:ssm-celery-beat]
environment=%(ENV_SSM_ENV)s
command=ssm-celery beat -l info
umask=022
user=%(ENV_SSM_USER)s
redirect_stderr=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
killasgroup=true
